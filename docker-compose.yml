version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: deploy/api.Dockerfile
    container_name: music-iq-api
    restart: unless-stopped
    volumes:
      - ./vectorstore:/app/vectorstore
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - PYTHONPATH=/app
    command: >
      bash -lc "python -m uvicorn src.api.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 15
      start_period: 30s

  streamlit:
    build:
      context: .
      dockerfile: deploy/streamlit.Dockerfile
    container_name: music-iq-streamlit
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    command: >
      bash -lc "streamlit run app.py --server.address 0.0.0.0 --server.port 8501"
    ports:
      - "127.0.0.1:8501:8501"
    environment:
      - API_BASE_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health').read()"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 30s

  nginx:
    image: nginx:stable
    container_name: music-iq-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
      - ./deploy/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      streamlit:
        condition: service_healthy
